name: GHCR Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Optional override image tag (default: current commit SHA)"
        required: false
        type: string

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  GHCR_NAMESPACE: ${{ github.repository_owner }}

jobs:
  build_push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image tag
        id: vars
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            echo "image_tag=${{ github.event.inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: |
            ghcr.io/${{ env.GHCR_NAMESPACE }}/a20-backend:${{ steps.vars.outputs.image_tag }}
            ghcr.io/${{ env.GHCR_NAMESPACE }}/a20-backend:pilot-latest

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: |
            ghcr.io/${{ env.GHCR_NAMESPACE }}/a20-frontend:${{ steps.vars.outputs.image_tag }}
            ghcr.io/${{ env.GHCR_NAMESPACE }}/a20-frontend:pilot-latest

  deploy:
    name: Deploy to Swarm
    runs-on: ubuntu-latest
    needs: build_push
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script_stop: true
          script: |
            set -euo pipefail
            cd ~/A20-App-001
            git fetch --all --prune
            git checkout main
            git reset --hard origin/main
            export GHCR_NAMESPACE="${{ env.GHCR_NAMESPACE }}"
            export IMAGE_TAG="${{ needs.build_push.outputs.image_tag }}"
            bash scripts/redeploy.sh
