# Docker Swarm stack cho A20-App-001 (Pilot)
# Cách dùng (build local trên server):
#   1) Build image local: docker compose build backend frontend
#   2) Deploy: docker stack deploy -c docker-stack.yml memio
# Lưu ý:
#   - Image dùng local tag, không phụ thuộc GHCR/CI.
#   - Postgres tự host KHÔNG nằm trong stack này (chạy riêng).
#   - update_config: start-first cho service stateless, stop-first cho beat (chỉ 1 instance).
version: "3.8"

services:
  caddy:
    image: caddy:2-alpine
    ports:
      - target: 80
        published: 80
        mode: host
      - target: 443
        published: 443
        mode: host
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
      update_config:
        parallelism: 1
        delay: 5s
        # Caddy publish 80/443 với mode=host nên không thể start task mới khi task cũ còn giữ port.
        # Dùng stop-first để tránh kẹt "host-mode port already in use".
        order: stop-first
        failure_action: rollback

  backend:
    image: a20-app-001-backend:pilot
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    command: ["uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8000"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
        monitor: 30s

  redis:
    image: redis:7-alpine
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

  worker:
    image: a20-app-001-backend:pilot
    env_file:
      - .env
    command: ["celery", "-A", "src.app.worker.celery_app.celery_app", "worker", "-l", "INFO"]
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
      resources:
        limits:
          memory: 384M
          cpus: "0.75"
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first

  beat:
    image: a20-app-001-backend:pilot
    env_file:
      - .env
    command: ["celery", "-A", "src.app.worker.celery_app.celery_app", "beat", "-l", "INFO"]
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
      update_config:
        parallelism: 1
        delay: 5s
        order: stop-first

  frontend:
    image: a20-app-001-frontend:pilot
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
      resources:
        limits:
          memory: 384M
          cpus: "0.75"
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback

volumes:
  caddy_data:
  caddy_config:
