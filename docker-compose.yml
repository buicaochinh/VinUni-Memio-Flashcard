services:
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: always
    mem_limit: 128m
    cpus: 0.25
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend

  backend:
    image: a20-app-001-backend:pilot
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    restart: always
    mem_limit: 512m
    cpus: 1.0
    command: ["uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8000"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    mem_limit: 128m
    cpus: 0.25

  worker:
    image: a20-app-001-backend:pilot
    env_file:
      - .env
    depends_on:
      - redis
      - backend
    volumes:
      - ./data:/app/data
    restart: always
    mem_limit: 384m
    cpus: 0.75
    environment:
      - PYTHONPATH=.
    command: ["celery", "-A", "src.app.worker.celery_app:celery_app", "worker", "-l", "INFO", "--pool", "solo"]

  beat:
    image: a20-app-001-backend:pilot
    env_file:
      - .env
    depends_on:
      - redis
      - backend
    volumes:
      - ./data:/app/data
    restart: always
    mem_limit: 128m
    cpus: 0.25
    environment:
      - PYTHONPATH=.
    command: ["celery", "-A", "src.app.worker.celery_app:celery_app", "beat", "-l", "INFO", "--schedule", "/tmp/celerybeat-schedule"]

  frontend:
    image: a20-app-001-frontend:pilot
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://caddy:80}
    depends_on:
      backend:
        condition: service_healthy
    restart: always
    mem_limit: 384m
    cpus: 0.75

volumes:
  caddy_data:
  caddy_config:
