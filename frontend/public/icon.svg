<svg viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#1e3a8a" />
    </linearGradient>
    <linearGradient id="aiGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c084fc" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <linearGradient id="sparkleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#e0e7ff" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-opacity="0.25" flood-color="#000" />
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="24" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Ambient Glow -->
  <circle cx="256" cy="256" r="160" fill="url(#aiGlow)" filter="url(#glow)" opacity="0.4" />

  <!-- Back Card (AI Gradient) -->
  <rect x="160" y="70" width="240" height="340" rx="48" transform="rotate(18 280 240)" fill="url(#aiGlow)" filter="url(#shadow)" />
  
  <!-- Front Card (Solid Blue Gradient) -->
  <rect x="110" y="90" width="240" height="340" rx="48" fill="url(#cardBg)" filter="url(#shadow)" />

  <!-- Big Central AI Sparkle -->
  <path d="M230 140 C230 215 155 215 155 215 C155 215 230 215 230 290 C230 215 305 215 305 215 C305 215 230 215 230 140 Z" fill="url(#sparkleGrad)" filter="url(#shadow)"/>
  
  <!-- Small AI Sparkle -->
  <path d="M310 100 C310 130 280 130 280 130 C280 130 310 130 310 160 C310 130 340 130 340 130 C340 130 310 130 310 100 Z" fill="#e879f9" />
  
  <!-- Extra Small AI Sparkle -->
  <path d="M120 240 C120 255 105 255 105 255 C105 255 120 255 120 270 C120 255 135 255 135 255 C135 255 120 255 120 240 Z" fill="#93c5fd" />

  <!-- Minimal UI elements representing data being processed -->
  <rect x="155" y="310" width="150" height="16" rx="8" fill="white" opacity="0.9" />
  <rect x="155" y="350" width="90" height="16" rx="8" fill="white" opacity="0.6" />
</svg>
