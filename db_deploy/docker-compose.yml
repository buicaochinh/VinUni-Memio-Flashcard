services:
  postgres:
    image: postgres:16-alpine
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-flashcard}
      POSTGRES_USER: ${POSTGRES_USER:-flashcard_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-flashcard_user} -d ${POSTGRES_DB:-flashcard}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
